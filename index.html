<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MR Store - HEN Services</title>
<style>
:root {
  --bg: #0a0a0a;
  --card: #111111;
  --accent: #ff00ff;
  --gold: #ff00ff;
  --note: #ff00cc;
  --muted: #999999;
  --success: #00ffaa;
  --error: #ff4444;
  --warning: #ff9800;
  --paypal: #0070ba;
  --neon-pink: #ff00ff;
  --neon-purple: #9d00ff;
  --neon-cyan: #00ffff;
  --hen-rgb: linear-gradient(135deg, #ff00ff, #00ffff, #ff00ff);
  --game-blue: #00aaff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Tajawal", sans-serif;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%);
  color: #fff;
  line-height: 1.6;
  min-height: 100vh;
}

/* Header - RGB Neon */
header {
  background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(26,0,51,0.95));
  padding: 18px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid var(--neon-pink);
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(10px);
  animation: borderGlow 2s ease-in-out infinite;
}

@keyframes borderGlow {
  0% { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
  33% { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
  66% { border-color: #ffff00; box-shadow: 0 0 10px #ffff00; }
  100% { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 28px;
  font-weight: 900;
  background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-decoration: none;
  animation: rgbText 3s ease infinite;
}

@keyframes rgbText {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

.logo i {
  font-size: 32px;
  color: var(--neon-pink);
  filter: drop-shadow(0 0 8px rgba(255,0,255,0.7));
  animation: iconPulse 1s ease-in-out infinite alternate;
}

@keyframes iconPulse {
  from { filter: drop-shadow(0 0 5px #ff00ff); }
  to { filter: drop-shadow(0 0 15px #00ffff); }
}

.user-section {
  display: flex;
  align-items: center;
  gap: 15px;
}

/* Navigation - RGB */
.main-nav {
  background: linear-gradient(90deg, rgba(0,0,0,0.95), rgba(26,0,51,0.95));
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 15px;
  position: sticky;
  top: 76px;
  z-index: 999;
  flex-wrap: wrap;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,0,255,0.3);
}

.nav-btn {
  background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(0,255,255,0.1));
  color: white;
  text-decoration: none;
  padding: 12px 25px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 800;
  transition: all 0.3s;
  border: 2px solid transparent;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 16px;
  position: relative;
  overflow: hidden;
}

.nav-btn:before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: all 0.6s;
}

.nav-btn:hover:before {
  left: 100%;
}

.nav-btn:hover {
  border-color: var(--neon-pink);
  transform: translateY(-3px);
  box-shadow: 0 0 20px rgba(255,0,255,0.4);
}

.nav-btn.active {
  background: linear-gradient(135deg, #ff00ff, #9d00ff);
  border-color: #ff00ff;
  box-shadow: 0 0 25px rgba(255,0,255,0.5);
  animation: btnPulse 1s ease-in-out infinite alternate;
}

@keyframes btnPulse {
  from { box-shadow: 0 0 15px #ff00ff; }
  to { box-shadow: 0 0 30px #00ffff; }
}

/* Main Container */
.main-container {
  max-width: 1200px;
  margin: 25px auto;
  padding: 0 20px;
}

.section {
  display: none;
  animation: fadeIn 0.5s ease;
}

.section.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Card Styles - RGB */
.section-card {
  background: linear-gradient(135deg, rgba(17,17,17,0.95), rgba(26,0,51,0.95));
  border-radius: 20px;
  padding: 30px;
  margin-bottom: 30px;
  border: 2px solid rgba(255,0,255,0.3);
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
  animation: cardGlow 3s ease-in-out infinite;
}

@keyframes cardGlow {
  0% { border-color: rgba(255,0,255,0.3); box-shadow: 0 0 20px rgba(255,0,255,0.1); }
  50% { border-color: rgba(0,255,255,0.3); box-shadow: 0 0 30px rgba(0,255,255,0.2); }
  100% { border-color: rgba(255,0,255,0.3); box-shadow: 0 0 20px rgba(255,0,255,0.1); }
}

.section-title {
  background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-size: 32px;
  margin-bottom: 25px;
  padding-bottom: 20px;
  border-bottom: 2px solid rgba(255,0,255,0.3);
  display: flex;
  align-items: center;
  gap: 15px;
  animation: rgbText 3s ease infinite;
}

.section-title i {
  font-size: 36px;
  color: var(--neon-pink);
  filter: drop-shadow(0 0 8px rgba(255,0,255,0.7));
}

/* Service Selector */
.service-selector {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.service-card {
  background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(255,0,255,0.1));
  border-radius: 15px;
  padding: 25px;
  text-align: center;
  cursor: pointer;
  transition: all 0.4s;
  border: 2px solid transparent;
  position: relative;
  overflow: hidden;
}

.service-card:hover {
  transform: translateY(-10px) scale(1.05);
  border-color: var(--neon-pink);
  box-shadow: 0 15px 35px rgba(255,0,255,0.2);
}

.service-card.active {
  background: linear-gradient(135deg, #ff00ff, #9d00ff);
  border-color: #ff00ff;
  box-shadow: 0 0 30px rgba(255,0,255,0.4);
}

.service-icon {
  font-size: 48px;
  margin-bottom: 20px;
  transition: all 0.4s;
}

.service-card.active .service-icon {
  color: white;
  transform: scale(1.2);
  filter: drop-shadow(0 0 10px white);
}

.service-name {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 10px;
}

.service-price {
  font-size: 20px;
  font-weight: bold;
  margin-top: 10px;
  color: var(--success);
}

/* Game Selection Grid - Blue Theme */
.games-selection {
  background: rgba(0, 170, 255, 0.05);
  border-radius: 15px;
  padding: 20px;
  margin: 20px 0;
  border: 1px solid rgba(0, 170, 255, 0.3);
}

.games-selection h4 {
  color: var(--game-blue);
  margin-bottom: 15px;
  font-size: 18px;
}

.game-items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
  max-height: 400px;
  overflow-y: auto;
  padding: 10px;
}

.game-item {
  background: rgba(0, 170, 255, 0.1);
  border: 1px solid rgba(0, 170, 255, 0.3);
  border-radius: 10px;
  padding: 15px;
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
}

.game-item:hover {
  background: rgba(0, 170, 255, 0.2);
  transform: translateY(-3px);
}

.game-item.selected {
  background: rgba(0, 170, 255, 0.4);
  border-color: var(--game-blue);
  box-shadow: 0 0 15px rgba(0, 170, 255, 0.3);
}

.game-item-name {
  font-weight: bold;
  margin-bottom: 8px;
}

.game-item-price {
  color: var(--game-blue);
  font-weight: bold;
  font-size: 14px;
}

/* Order Summary */
.order-summary-box {
  background: linear-gradient(135deg, rgba(0,255,170,0.1), rgba(255,0,255,0.05));
  padding: 25px;
  border-radius: 15px;
  margin: 25px 0;
  border: 2px solid rgba(255,0,255,0.3);
  backdrop-filter: blur(5px);
}

.summary-title {
  color: var(--success);
  font-size: 22px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  text-shadow: 0 0 8px rgba(0,255,170,0.5);
}

.selected-services {
  list-style: none;
  margin: 0;
  padding: 0;
  max-height: 300px;
  overflow-y: auto;
}

.selected-services li {
  padding: 15px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 10px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid rgba(255,0,255,0.1);
}

.total-price {
  color: var(--gold);
  font-weight: 900;
  font-size: 28px;
  text-align: center;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 2px solid rgba(255,0,255,0.3);
  text-shadow: 0 0 15px rgba(255,0,255,0.4);
}

/* Customer Info */
.customer-info {
  background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(0,255,255,0.05));
  padding: 25px;
  border-radius: 15px;
  margin: 25px 0;
  border: 2px solid rgba(255,0,255,0.3);
  backdrop-filter: blur(5px);
}

.form-group {
  margin-bottom: 25px;
}

.form-group label {
  display: block;
  margin-bottom: 10px;
  font-weight: 800;
  color: var(--neon-pink);
  font-size: 16px;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 15px;
  background: rgba(0, 0, 0, 0.6);
  border: 2px solid rgba(255,0,255,0.3);
  border-radius: 10px;
  color: white;
  font-size: 16px;
  transition: all 0.3s;
  font-family: "Tajawal", sans-serif;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--neon-pink);
  box-shadow: 0 0 25px rgba(255,0,255,0.3);
}

/* UWallet Section */
.uwallet-section {
  background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(0,255,255,0.05));
  border: 2px solid var(--neon-pink);
  border-radius: 20px;
  padding: 30px;
  margin: 25px 0;
  text-align: center;
  animation: uwalletPulse 2s ease-in-out infinite;
}

@keyframes uwalletPulse {
  0% { border-color: #ff00ff; box-shadow: 0 0 20px rgba(255,0,255,0.2); }
  50% { border-color: #00ffff; box-shadow: 0 0 40px rgba(0,255,255,0.3); }
  100% { border-color: #ff00ff; box-shadow: 0 0 20px rgba(255,0,255,0.2); }
}

.uwallet-title {
  background: linear-gradient(90deg, #ff00ff, #00ffff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-size: 28px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
}

.uwallet-username {
  background: rgba(255,0,255,0.2);
  padding: 20px;
  border-radius: 15px;
  margin: 20px 0;
  border: 2px solid #ff00ff;
}

.uwallet-name {
  font-size: 32px;
  font-weight: 900;
  color: #00ffff;
  text-shadow: 0 0 15px rgba(0,255,255,0.5);
  letter-spacing: 2px;
}

.uwallet-btn {
  background: linear-gradient(135deg, #ff00ff, #9d00ff);
  color: white;
  border: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: all 0.3s;
  margin-top: 15px;
}

.uwallet-btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 30px rgba(255,0,255,0.5);
}

/* Action Buttons */
.action-buttons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.btn {
  padding: 18px;
  border: none;
  border-radius: 12px;
  font-weight: 900;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all 0.4s;
  position: relative;
  overflow: hidden;
}

.btn:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.btn-primary {
  background: linear-gradient(135deg, #ff00ff, #9d00ff);
  color: white;
}

.btn-success {
  background: linear-gradient(135deg, #00ffaa, #00cc88);
  color: #051020;
}

.btn-danger {
  background: linear-gradient(135deg, #ff4444, #ff3366);
  color: white;
}

/* RGB Modal for PS4/PS3 Warning */
.rgb-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 1002;
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.3s ease;
  backdrop-filter: blur(10px);
}

.rgb-modal-content {
  background: linear-gradient(135deg, #111, #1a0033);
  padding: 35px;
  border-radius: 20px;
  max-width: 500px;
  width: 90%;
  border: 3px solid transparent;
  animation: rgbBorder 1s ease-in-out infinite;
  box-shadow: 0 0 50px rgba(255,0,255,0.3);
  text-align: center;
}

@keyframes rgbBorder {
  0% { border-color: #ff00ff; box-shadow: 0 0 30px #ff00ff; }
  33% { border-color: #00ffff; box-shadow: 0 0 30px #00ffff; }
  66% { border-color: #ffff00; box-shadow: 0 0 30px #ffff00; }
  100% { border-color: #ff00ff; box-shadow: 0 0 30px #ff00ff; }
}

.rgb-modal-icon {
  font-size: 60px;
  margin-bottom: 20px;
  animation: iconPulse 0.5s ease-in-out infinite;
}

.rgb-modal-title {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 20px;
  background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.rgb-modal-message {
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 25px;
  color: #fff;
}

.rgb-modal-buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
}

.rgb-modal-btn {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
}

.rgb-modal-btn-accept {
  background: linear-gradient(135deg, #00ffaa, #00cc88);
  color: #000;
}

.rgb-modal-btn-cancel {
  background: linear-gradient(135deg, #ff4444, #ff3366);
  color: white;
}

.rgb-modal-btn:hover {
  transform: scale(1.05);
}

/* Blue Modal for Games */
.blue-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.9);
  z-index: 1002;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(8px);
}

.blue-modal-content {
  background: linear-gradient(135deg, #0a1a2a, #0a0a2a);
  padding: 35px;
  border-radius: 20px;
  max-width: 500px;
  width: 90%;
  border: 2px solid var(--game-blue);
  box-shadow: 0 0 30px rgba(0, 170, 255, 0.3);
  text-align: center;
}

.blue-modal-icon {
  font-size: 60px;
  margin-bottom: 20px;
  color: var(--game-blue);
}

.blue-modal-title {
  font-size: 26px;
  font-weight: 900;
  margin-bottom: 20px;
  color: var(--game-blue);
}

.blue-modal-message {
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 25px;
  color: #ccc;
}

.blue-modal-buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
}

.blue-modal-btn {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
}

.blue-modal-btn-accept {
  background: linear-gradient(135deg, #00aaff, #0088cc);
  color: white;
}

.blue-modal-btn-cancel {
  background: #333;
  color: white;
}

/* Normal Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 1002;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(10px);
}

.modal-content {
  background: linear-gradient(135deg, #111, #1a0033);
  padding: 35px;
  border-radius: 20px;
  max-width: 500px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  border: 3px solid #ff00ff;
  box-shadow: 0 0 50px rgba(255,0,255,0.3);
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.modal-title {
  background: linear-gradient(90deg, #ff00ff, #00ffff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-size: 26px;
  margin: 0;
}

.close-modal {
  background: none;
  border: none;
  color: #ff00ff;
  font-size: 32px;
  cursor: pointer;
  transition: all 0.3s;
}

.close-modal:hover {
  transform: rotate(90deg);
}

/* Note Box */
.note-box {
  background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(0,255,255,0.05));
  padding: 25px;
  border-radius: 15px;
  margin: 25px 0;
  border-right: 5px solid var(--neon-pink);
}

.note-title {
  color: var(--neon-pink);
  font-weight: 900;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 20px;
}

/* Alert */
.alert {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 20px 30px;
  border-radius: 15px;
  color: white;
  font-weight: bold;
  z-index: 1004;
  animation: slideInRight 0.4s ease;
  max-width: 450px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  gap: 15px;
  backdrop-filter: blur(10px);
}

@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.alert-success { background: linear-gradient(135deg, #00ffaa, #00cc88); }
.alert-error { background: linear-gradient(135deg, #ff4444, #ff3366); }
.alert-warning { background: linear-gradient(135deg, #ffff00, #ffcc00); color: #000; }
.alert-info { background: linear-gradient(135deg, #ff00ff, #9d00ff); }

/* Loading */
.loading {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 1003;
  justify-content: center;
  align-items: center;
}

.spinner {
  width: 80px;
  height: 80px;
  border: 5px solid #ff00ff;
  border-top: 5px solid #00ffff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Footer */
footer {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  margin-top: 60px;
  border-top: 1px solid rgba(255,0,255,0.2);
  background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(26,0,51,0.95));
}

/* Responsive */
@media (max-width: 768px) {
  .main-container { padding: 0 15px; }
  .section-card { padding: 20px; }
  .service-selector { grid-template-columns: 1fr; }
  .action-buttons { grid-template-columns: 1fr; }
  .main-nav { justify-content: flex-start; overflow-x: auto; }
  .nav-btn { white-space: nowrap; font-size: 14px; padding: 10px 15px; }
  header { flex-direction: column; gap: 15px; }
  .game-items-grid { grid-template-columns: 1fr; }
}
</style>

</head>
<body>

<header>
  <a href="#" class="logo" onclick="showSection('products')">
    <i class="fas fa-store"></i>
    <span>MR Store</span>
  </a>
